services:
  - type: web
    name: restaurant-inventory-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: restaurant-inventory-db
          property: connectionString
      - key: FRONTEND_ORIGINS
        value: https://homecook-webapp.vercel.app
      - key: API_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false

databases:
  - name: restaurant-inventory-db
    plan: free
    databaseName: restaurant_inventory
    user: restaurant_inventory_user
